name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
        
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease
        
      - name: Get version from build.gradle
        id: version
        working-directory: android
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | awk -F'"' '{print $2}')
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk JNet-Music-Player.apk
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: JNet Music Player v${{ steps.version.outputs.version }}
          files: JNet-Music-Player.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}